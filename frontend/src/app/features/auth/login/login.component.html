<div class="auth-page">
  <!-- Animated background -->
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-lines"></div>
  </div>

  <!-- Card -->
  <div class="auth-card fade-in">
    <!-- Logo & Header -->
    <div class="auth-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M4 20L12 8L16 14L20 10L24 20H4Z" fill="url(#grad)" opacity="0.9"/>
            <path d="M8 20L14 12L20 20" fill="url(#grad2)" opacity="0.6"/>
            <defs>
              <linearGradient id="grad" x1="4" y1="8" x2="24" y2="20">
                <stop offset="0%" stop-color="#7C6AF7"/>
                <stop offset="100%" stop-color="#00D4AA"/>
              </linearGradient>
              <linearGradient id="grad2" x1="8" y1="12" x2="20" y2="20">
                <stop offset="0%" stop-color="#9D8FF9"/>
                <stop offset="100%" stop-color="#00FFCC"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">CODAI</span>
      </div>
      <h1 class="auth-title">Bienvenido de vuelta</h1>
      <p class="auth-subtitle">David te está esperando para ayudarte a crear algo increíble</p>
    </div>

    <!-- Error Alert -->
    @if (error()) {
      <div class="alert-error fade-in">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/>
        </svg>
        {{ error() }}
      </div>
    }

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Correo electrónico</label>
        <input
          id="login-email"
          type="email"
          class="form-control"
          [class.is-error]="form.get('email')?.invalid && form.get('email')?.touched"
          formControlName="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="form-error">Email inválido</span>
        }
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <div class="input-password-wrapper">
          <input
            id="login-password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control"
            [class.is-error]="form.get('password')?.invalid && form.get('password')?.touched"
            formControlName="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="current-password"
          />
          <button type="button" class="btn-icon toggle-pass" (click)="togglePassword()" id="toggle-password-btn">
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        id="login-submit-btn"
        type="submit"
        class="btn btn-primary w-full submit-btn"
        [disabled]="form.invalid || loading()"
      >
        @if (loading()) {
          <div class="spinner"></div>
          <span>Iniciando sesión...</span>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span>Iniciar Sesión</span>
        }
      </button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" id="go-register-link">Crear cuenta gratuita</a>
    </div>

    <!-- David tag -->
    <div class="david-tag">
      <div class="david-dot"></div>
      <span>David AI · Online</span>
    </div>
  </div>
</div>
